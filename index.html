<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instant AR Receipt Holder</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <script>
        // --- カスタム形状（斜めカットの筒）を定義 ---
        AFRAME.registerComponent('receipt-holder', {
            init: function () {
                const radius = 0.5;   // ARで見やすいサイズに調整 (約10cm)
                const height = 1.5;
                const thickness = 0.03;
                const slant = 0.3;

                // 断面（ドーナツ型）の作成
                const shape = new THREE.Shape();
                shape.absarc(0, 0, radius, 0, Math.PI * 2, false);
                const hole = new THREE.Path();
                hole.absarc(0, 0, radius - thickness, 0, Math.PI * 2, true);
                shape.holes.push(hole);

                // 押し出し
                const geometry = new THREE.ExtrudeGeometry(shape, {
                    depth: height,
                    bevelEnabled: false,
                    curveSegments: 48
                });

                // 斜めカット
                const pos = geometry.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    const y = pos.getY(i);
                    const z = pos.getZ(i);
                    if (z > 0) {
                        pos.setZ(i, z + (y / radius) * slant);
                    }
                }
                geometry.computeVertexNormals();
                geometry.rotateX(-Math.PI / 2); // 立てる

                // マテリアル（透明感のある青）
                const material = new THREE.MeshPhongMaterial({
                    color: 0x3399ff,
                    transparent: true,
                    opacity: 0.6,
                    side: THREE.DoubleSide,
                    shininess: 100
                });

                const mesh = new THREE.Mesh(geometry, material);
                this.el.setObject3D('mesh', mesh);
            }
        });
    </script>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro">
            <a-entity receipt-holder position="0 0 0" scale="1 1 1"></a-entity>
            <a-light type="directional" position="1 2 1" intensity="1"></a-light>
            <a-light type="ambient" intensity="0.5"></a-light>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
