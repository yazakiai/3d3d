<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Three.js Receipt Holder - Realistic</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #e0e0e0; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 設定値 (cm単位) ---
    const CONFIG = {
        radius: 3.5,      // 筒の半径
        height: 15,       // 高さ
        thickness: 0.3,   // 壁の厚み (3mm)
        slantAmount: 3.0  // 斜めカットの深さ
    };

    // --- シーン基本設定 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdddddd);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(15, 20, 25);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // --- 環境光・照明（透明感を引き出す設定） ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const topLight = new THREE.DirectionalLight(0xffffff, 1);
    topLight.position.set(5, 20, 10);
    scene.add(topLight);

    // --- ジオメトリの作成 ---
    // 1. ドーナツ型の断面を作成
    const shape = new THREE.Shape();
    shape.absarc(0, 0, CONFIG.radius, 0, Math.PI * 2, false); // 外円
    
    const hole = new THREE.Path();
    hole.absarc(0, 0, CONFIG.radius - CONFIG.thickness, 0, Math.PI * 2, true); // 内円（空洞）
    shape.holes.push(hole);

    // 2. 断面を上に15cm押し出す
    const extrudeSettings = {
        depth: CONFIG.height,
        bevelEnabled: false,
        curveSegments: 64
    };
    const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);

    // 3. 上端の頂点を移動させて斜めにカットする
    // ExtrudeGeometryはデフォルトでZ方向に伸びるため、Z座標で判定
    const position = geometry.attributes.position;
    for (let i = 0; i < position.count; i++) {
        const x = position.getX(i);
        const y = position.getY(i);
        const z = position.getZ(i);

        // Zが最大の面（上端）の頂点を斜めにする
        if (z > 0) {
            // Y座標（断面の前後）を利用して高さをずらす
            const offset = (y / CONFIG.radius) * CONFIG.slantAmount;
            position.setZ(i, z + offset);
        }
    }
    geometry.computeVertexNormals();

    // 4. 全体を立てる（ZアップからYアップへ回転）
    geometry.rotateX(-Math.PI / 2);

    // --- マテリアル（透明プラスチック） ---
    const material = new THREE.MeshPhysicalMaterial({
        color: 0x99ccff,           // ほんのり青みがかった透明
        metalness: 0,
        roughness: 0.1,            // ツヤ感
        transmission: 0.6,         // 透過度（0〜1）
        thickness: CONFIG.thickness, // 屈折用の厚み設定
        transparent: true,
        opacity: 0.5,
        side: THREE.DoubleSide
    });

    const holder = new THREE.Mesh(geometry, material);
    scene.add(holder);

    // 5. 底の板を追加（中が空洞なので底が必要）
    const bottomGeo = new THREE.CylinderGeometry(CONFIG.radius, CONFIG.radius, CONFIG.thickness, 64);
    const bottom = new THREE.Mesh(bottomGeo, material);
    bottom.position.y = CONFIG.thickness / 2;
    scene.add(bottom);

    // 床（地面）のグリッド
    const grid = new THREE.GridHelper(50, 50);
    scene.add(grid);

    // --- アニメーション ---
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();

    // --- GLTFExporterをインポートに追加 ---
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

// --- ダウンロード関数 ---
function saveArrayBuffer(buffer, filename) {
    const blob = new Blob([buffer], { type: 'application/octet-stream' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
}

function exportModel() {
    const exporter = new GLTFExporter();
    exporter.parse(holder, (result) => {
        saveArrayBuffer(result, 'receipt_holder.glb');
    }, { binary: true });
}

// どこかにボタンを作って exportModel() を実行するようにすれば、PCに保存されます

</script>
</body>
</html>
